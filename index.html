<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <!-- Pinch-zoom is DELIBERATELY disabled (maximum-scale=1, user-scalable=no, plus the
       gesturestart preventDefault below) for a locked, native-app feel — the site owner's
       choice (re-confirmed 2026-06-05, Stage E4). This is the one thing keeping the Lighthouse
       Accessibility score at ~92 (the "viewport" audit) — an accepted tradeoff, NOT a bug; do
       not "fix" it. To re-enable zoom for accessibility instead, drop maximum-scale/user-scalable
       here AND remove the gesturestart handler in the script below. -->
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#0d1117">
  <title>Calendar Game</title>
  <meta name="description" content="A free, mobile-first trainer for fast mental day-of-the-week calculation — practice the doomsday method with timed drills, deduction puzzles, and instant date lookups."/>
  <!-- Social-share / link-preview cards (Open Graph + Twitter). The image is generated from the
       W5 icon by design/icons/build-og.mjs (public/og-image.jpg, 1200x630). The og:url + absolute
       image URLs point at the canonical site https://calendargame.app (the printed/book URL the
       cutover connects). OG requires ABSOLUTE image URLs. -->
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="Calendar Game"/>
  <meta property="og:title" content="Calendar Game"/>
  <meta property="og:description" content="Master Mental Day-of-the-Week Calculation"/>
  <meta property="og:url" content="https://calendargame.app/"/>
  <meta property="og:image" content="https://calendargame.app/og-image.jpg"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:image:alt" content="The Calendar Game app icon beside the tagline Master Mental Day-of-the-Week Calculation"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Calendar Game"/>
  <meta name="twitter:description" content="Master Mental Day-of-the-Week Calculation"/>
  <meta name="twitter:image" content="https://calendargame.app/og-image.jpg"/>
  <meta name="application-name" content="Calendar Game">
  <meta name="apple-mobile-web-app-title" content="Calendar Game">
  <!-- PWA standalone (Stage D3): launches full-screen from the home screen. No safe-area
       handling in the app, so the status bar is a solid (non-translucent) bar — content
       starts below it. Verify the standalone look on iPhone at the acceptance deploy. -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <!-- Icons (generated from the W5 master by design/icons/build-icons.mjs). The web app
       manifest link + service-worker registration are injected by vite-plugin-pwa. -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <!-- Dark-mode home-screen icon is DISABLED. iOS does not reliably honor a dark-variant
       apple-touch-icon (often needs a remove + re-add, or ignores it), so we ship the single
       light icon. The dark master (design/icons/icon-piday-trace-dark.svg) is kept; to re-enable,
       uncomment the link below AND the dark lines in design/icons/build-icons.mjs, then re-run it.
  <link rel="apple-touch-icon" href="/apple-touch-icon-dark.png" media="(prefers-color-scheme: dark)"> -->
  <!-- Apply the SAVED theme + its matching toolbar color BEFORE React mounts, so there's no
       wrong-theme / dark-toolbar flash on first paint (Q2). Mirrors the store's resolution
       (useSystem ? OS-dark?darkTheme:lightTheme : manualTheme) from localStorage 'cg-settings-v1';
       falls back to the OS light/dark default (= SETTINGS_DEFAULTS) when nothing is saved. The color
       map is each theme's --tc in src/index.css — keep in sync if those change. Also blocks the iOS
       pinch-zoom gesture (the deliberate locked zoom; see the viewport meta above). -->
  <script>(function(){
    var d=window.matchMedia('(prefers-color-scheme: dark)').matches,t;
    try{var s=JSON.parse(localStorage.getItem('cg-settings-v1')).state;t=s.useSystem?(d?s.darkTheme:s.lightTheme):s.manualTheme;}catch(e){}
    if(!t)t=d?'dusk':'light';
    document.documentElement.setAttribute('data-theme',t);
    var c={dusk:'#0d1117',midnight:'#000',nebula:'#0b0714',parchment:'#f0e8d5',light:'#f2f2f7'},m=document.querySelector("meta[name='theme-color']");
    if(m&&c[t])m.content=c[t];
    document.addEventListener('gesturestart',function(e){e.preventDefault();});
  })();</script>
</head>
<body class="text-purple-50">
  <div id="root" class="min-h-screen">Loading…</div>
  <!-- Warm the home-screen icon into the browser cache on first load. Without this, tapping iOS's
       "Add to Home Screen" before the icon has downloaded makes iOS fall back to a generic snapshot
       (the icon must already be cached when that preview sheet renders). A real hidden <img> fetches
       it eagerly — with no "preloaded-but-unused" console warning a <link rel=preload> would cause in
       browsers that don't consume apple-touch-icon. -->
  <img src="/apple-touch-icon.png" alt="" aria-hidden="true" fetchpriority="high"
       style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none" />
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
